name: Backend Tests

on:
  push:
    paths: ['backend/**', '.github/workflows/backend-test.yml']
  pull_request:
    paths: ['backend/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-dev libxslt1-dev
      - run: pip install -r requirements.txt
        working-directory: backend
      - run: python -m unittest discover -s tests -v
        working-directory: backend
        env:
          DB_PATH: /tmp/test.db

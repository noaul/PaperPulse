services:
  app:
    build: .
    container_name: paperpulse
    ports:
      - "127.0.0.1:18095:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - DB_PATH=/app/data/paperpulse.db
      - STATIC_DIR=/app/static
      - JWT_SECRET=${JWT_SECRET:-paperpulse-change-me-in-production}
      - UVICORN_WORKERS=1
      # Optional: Use PostgreSQL instead of SQLite (requires asyncpg)
      # - DATABASE_URL=postgresql+asyncpg://user:pass@db:5432/paperpulse
      # Optional: Enable CORS for frontend dev server
      # - CORS_ORIGINS=http://localhost:5173
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
